name: Build

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # The repo does NOT ship gradlew (binary blob, cannot be committed by AI).
      # Download a standalone Gradle 2.14.1 distribution — the exact version
      # ForgeGradle 2.1 requires — and invoke it directly.
      - name: Download Gradle 2.14.1
        run: |
          curl -sSL -o gradle.zip https://services.gradle.org/distributions/gradle-2.14.1-bin.zip
          unzip -q gradle.zip -d $HOME
          echo "$HOME/gradle-2.14.1/bin" >> $GITHUB_PATH

      - name: Gradle version
        run: gradle --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Decomp Workspace
        run: gradle setupDecompWorkspace --no-daemon --stacktrace

      - name: Build
        run: gradle build --no-daemon --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LShiftFix-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Upload to Modrinth on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: lshiftfix
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          name: LShiftFix ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md
          loaders: forge
          game-versions: 1.8.9
          dependencies: |
            mixinbooter(required)
          license: MIT

      - name: Upload to CurseForge on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1616352
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          name: LShiftFix ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md
          loaders: forge
          game-versions: 1.8.9
          dependencies: |
            mixinbooter(required)
          license: MIT
